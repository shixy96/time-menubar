name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Lint Swift
        run: xcrun swift-format lint --recursive Sources Tests

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project TimeMenubar.xcodeproj \
            -scheme TimeMenubarTests \
            -configuration Debug \
            -derivedDataPath build/DerivedData \
            -destination 'platform=macOS'

      - name: Package app
        run: ./script/package_release.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: TimeMenubar.app
          path: dist/TimeMenubar.app.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/TimeMenubar.app.zip
